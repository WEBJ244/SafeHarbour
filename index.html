<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            --pop-yellow: #FFDE00;
            --pop-red: #ED1C24;
            --pop-blue: #0081FF;
            --pop-cyan: #00DFFF;
            --ink-black: #000000;
            --white: #FFFFFF;
            --halftone-bg: radial-gradient(rgba(0,0,0,0.12) 1.5px, transparent 0);
        }

        body {
            background-color: #f7f7f7;
            background-image: var(--halftone-bg);
            background-size: 16px 16px;
            font-family: 'Comic Neue', cursive;
            margin: 0; padding: 0; color: var(--ink-black);
        }

        .portal { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        .header {
            text-align: center; background: var(--pop-yellow);
            border: 4px solid var(--ink-black); padding: 2rem;
            margin-bottom: 2rem; box-shadow: 12px 12px 0px var(--ink-black);
            transform: rotate(-1.5deg);
        }

        .brand-icon {
            width: 70px; height: 70px; background: var(--ink-black);
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--white); box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }
        .brand-icon svg { width: 40px; height: 40px; fill: var(--pop-yellow); }
        .brand-name { font-family: 'Bangers', cursive; font-size: 60px; margin: 0; letter-spacing: 3px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab {
            flex: 1; padding: 15px; font-family: 'Bangers', cursive; font-size: 24px;
            border: 4px solid var(--ink-black); background: var(--white);
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink-black);
        }
        .tab.active { background: var(--pop-cyan); transform: translate(3px, 3px); box-shadow: 3px 3px 0px var(--ink-black); }

        .section { display: none; }
        .section.active { display: block; }

        .card {
            background: var(--white); border: 4px solid var(--ink-black);
            padding: 25px; margin-bottom: 25px; box-shadow: 10px 10px 0px var(--ink-black);
        }

        .lbl { font-family: 'Bangers', cursive; font-size: 26px; display: block; margin-bottom: 15px; color: var(--pop-red); }
        
        .choice-btn {
            padding: 10px 20px; border: 3px solid var(--ink-black);
            font-family: 'Bangers', cursive; font-size: 18px; cursor: pointer; background: var(--white);
            box-shadow: 4px 4px 0px var(--ink-black); margin-right: 12px; margin-bottom: 12px;
        }

        /* Logic Colors */
        .sel-med { background: var(--pop-yellow) !important; }
        .sel-high { background: var(--pop-blue) !important; color: white !important; }
        .sel-low { background: var(--pop-cyan) !important; }
        .sel-removed { background: var(--pop-red) !important; color: white !important; }

        .msg-area { 
            width: 100%; height: 120px; border: 4px solid var(--ink-black); 
            padding: 15px; font-family: inherit; font-size: 18px; font-weight: bold; 
        }

        .submit-btn {
            width: 100%; padding: 20px; background: var(--pop-red); color: var(--white);
            font-family: 'Bangers', cursive; font-size: 32px; border: 4px solid var(--ink-black);
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink-black);
        }

        .status-tag { font-family: 'Bangers'; padding: 2px 8px; border: 2px solid var(--ink-black); float: right; }
        .fb-text { font-size: 22px; font-weight: bold; margin: 15px 0; }
        .admin-comment { color: var(--pop-red); font-family: 'Permanent Marker'; font-size: 18px; }
    </style>
</head>
<body>

<div class="portal">
    <div class="header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <h1 class="brand-name">Voice Hub</h1>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('submit', this)">SEND DISPATCH</button>
        <button class="tab" onclick="showTab('board', this)">THE HUB</button>
        <button class="tab" onclick="showTab('admin', this)">ADMIN HQ</button>
    </div>

    <div id="submit" class="section active">
        <div class="card">
            <label class="lbl">CATEGORY</label>
            <div id="cat-group">
                <button class="choice-btn" onclick="setCat('conflict', this)">Conflict</button>
                <button class="choice-btn" onclick="setCat('management', this)">Management</button>
                <button class="choice-btn" onclick="setCat('policy', this)">Policy</button>
                <button class="choice-btn" onclick="setCat('wellbeing', this)">Wellbeing</button>
            </div>
            <label class="lbl">URGENCY</label>
            <div id="sev-group">
                <button class="choice-btn" onclick="setSev('low', this)">Low</button>
                <button class="choice-btn" onclick="setSev('medium', this)">Medium</button>
                <button class="choice-btn" onclick="setSev('high', this)">High</button>
            </div>
            <label class="lbl">MESSAGE</label>
            <textarea id="fb-text" class="msg-area" placeholder="Broadcast your message..."></textarea>
            <button class="submit-btn" onclick="submitReport()">BROADCAST NOW!</button>
        </div>
    </div>

    <div id="board" class="section">
        <div id="board-grid"></div>
    </div>

    <div id="admin" class="section">
        <div id="admin-gate" class="card" style="text-align:center;">
            <label class="lbl">ADMIN KEY REQUIRED</label>
            <input type="password" id="admin-pw">
            <br><br>
            <button class="choice-btn" onclick="login()">ENTER HQ</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <label class="lbl">HQ DASHBOARD</label>
                <button class="choice-btn sel-removed" onclick="logout()">LOGOUT</button>
            </div>
            <div id="admin-list"></div>
        </div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCg5LSNh0EIKjv5eQKPpWT8ZMF49zQX9Dc",
        authDomain: "voice-hub-portal.firebaseapp.com",
        databaseURL: "https://voice-hub-portal-default-rtdb.firebaseio.com",
        projectId: "voice-hub-portal",
        storageBucket: "voice-hub-portal.firebasestorage.app",
        messagingSenderId: "1052590708905",
        appId: "1:1052590708905:web:50237423f82a3c4ceeb1b8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const reportsRef = db.ref('reports');

    let selCat = ''; let selSev = '';

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function setCat(val, btn) {
        selCat = val;
        document.querySelectorAll('#cat-group .choice-btn').forEach(b => b.classList.remove('sel-med','sel-high','sel-low','sel-removed'));
        btn.classList.add('sel-low'); // Visual feedback
    }

    function setSev(val, btn) {
        selSev = val;
        document.querySelectorAll('#sev-group .choice-btn').forEach(b => b.classList.remove('sel-med','sel-high','sel-low'));
        btn.classList.add(val === 'medium' ? 'sel-med' : (val === 'high' ? 'sel-high' : 'sel-low'));
    }

    function submitReport() {
        const text = document.getElementById('fb-text').value;
        if(!selCat || !selSev || !text) return alert("Fill everything!");
        reportsRef.push({ 
            cat: selCat, sev: selSev, text: text, 
            date: new Date().toLocaleDateString(), 
            status: 'active', comment: '' 
        });
        alert("KAPOW! Sent.");
        document.getElementById('fb-text').value = '';
    }

    function login() {
        if(document.getElementById('admin-pw').value === 'Chat2026') {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("WRONG KEY!"); }
    }

    function logout() {
        document.getElementById('admin-pw').value = '';
        document.getElementById('admin-gate').style.display = 'block';
        document.getElementById('admin-panel').style.display = 'none';
    }

    function updateReport(id, status) {
        let comment = prompt("Enter Admin Comment:");
        if(comment === null) return;
        db.ref('reports/' + id).update({ status: status, comment: comment });
    }

    function hardDelete(id) {
        if(confirm("DELETE FOREVER?")) db.ref('reports/' + id).remove();
    }

    // Load Data
    reportsRef.on('value', (snap) => {
        const data = snap.val();
        const grid = document.getElementById('board-grid');
        const adminGrid = document.getElementById('admin-list');
        grid.innerHTML = ''; adminGrid.innerHTML = '';

        for(let id in data) {
            const r = data[id];
            const isRemoved = r.status === 'removed';
            
            // Public Card
            grid.innerHTML = `<div class="card" style="${isRemoved ? 'opacity:0.5' : ''}">
                <span class="status-tag ${r.status === 'active' ? 'sel-low' : 'sel-med'}">${r.status.toUpperCase()}</span>
                <label class="lbl">${r.cat}</label>
                <p class="fb-text">${isRemoved ? '[ REDACTED ]' : r.text}</p>
                ${r.comment ? `<p class="admin-comment">HQ: ${r.comment}</p>` : ''}
                <small>${r.date}</small>
            </div>` + grid.innerHTML;

            // Admin Card
            adminGrid.innerHTML = `<div class="card">
                <p><b>${r.text}</b></p>
                <button class="choice-btn sel-low" onclick="updateReport('${id}', 'resolved')">Resolve</button>
                <button class="choice-btn sel-med" onclick="updateReport('${id}', 'removed')">Soft Remove</button>
                <button class="choice-btn sel-removed" onclick="hardDelete('${id}')">Hard Delete</button>
            </div>` + adminGrid.innerHTML;
        }
    });
</script>
</body>
</html>
