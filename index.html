<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            --comic-yellow: #FFF8B0;
            --comic-pink: #FFD1DC;
            --comic-blue: #B0E0E6;
            --comic-green: #C1F0C1;
            --comic-red: #FF6B6B;
            --ink-black: #222222;
            --border-thick: 3px;
            /* Halftone pattern inspired by your comic reference */
            --halftone: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
        }

        body {
            background-color: #f0f0f0;
            background-image: var(--halftone);
            background-size: 20px 20px;
            font-family: 'Comic Neue', cursive;
            color: var(--ink-black);
            margin: 0; padding: 0;
        }

        .portal { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        .header {
            text-align: center;
            background: var(--comic-yellow);
            border: var(--border-thick) solid var(--ink-black);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 12px 12px 0px var(--ink-black);
            transform: rotate(-1deg);
        }

        .brand-name {
            font-family: 'Bangers', cursive;
            font-size: 64px;
            letter-spacing: 4px;
            text-shadow: 4px 4px 0px white;
            margin: 0;
        }

        .brand-sub { font-family: 'Permanent Marker', cursive; font-size: 18px; color: #555; }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 12px; margin-bottom: 25px; }
        .tab {
            flex: 1; padding: 15px;
            font-family: 'Bangers', cursive;
            font-size: 20px;
            border: var(--border-thick) solid var(--ink-black);
            background: white;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--ink-black);
            transition: 0.1s;
        }
        .tab.active { background: var(--comic-blue); transform: translate(3px, 3px); box-shadow: 3px 3px 0px var(--ink-black); }

        .section { display: none; }
        .section.active { display: block; }

        .card {
            background: white;
            border: var(--border-thick) solid var(--ink-black);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 8px 8px 0px var(--ink-black);
            position: relative;
        }

        /* Form Styling */
        .lbl { font-family: 'Bangers', cursive; font-size: 22px; display: block; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .choice-btn {
            padding: 10px 20px; border: 2.5px solid var(--ink-black);
            font-family: 'Bangers', cursive; font-size: 16px; cursor: pointer; background: white;
            box-shadow: 4px 4px 0px var(--ink-black);
        }

        /* Fixed Urgency Button Coloring */
        .sel-low { background: var(--comic-green) !important; }
        .sel-med { background: var(--comic-yellow) !important; } /* Fixed logic */
        .sel-high { background: var(--comic-red) !important; color: white; }
        
        .sel-conflict { background: var(--comic-pink) !important; }
        .sel-management { var(--comic-yellow) !important; }
        .sel-policy { background: var(--comic-blue) !important; }
        .sel-wellbeing { background: var(--comic-green) !important; }

        .msg-area { 
            width: 100%; height: 150px; border: var(--border-thick) solid var(--ink-black); 
            padding: 15px; font-family: inherit; font-size: 18px; font-weight: bold; 
            box-sizing: border-box; background: #fff;
        }

        .submit-btn {
            width: 100%; padding: 18px; background: var(--comic-red); color: white;
            font-family: 'Bangers', cursive; font-size: 28px; border: var(--border-thick) solid var(--ink-black);
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink-black); margin-top: 10px;
        }
        .submit-btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px var(--ink-black); }

        /* Board Cards */
        .badge { font-family: 'Bangers', cursive; padding: 4px 12px; border: 2px solid black; margin-right: 8px; font-size: 14px; text-transform: uppercase; }
        .fb-text { font-size: 20px; line-height: 1.5; margin: 15px 0; font-weight: 700; }
        .fb-date { font-family: 'Permanent Marker'; font-size: 14px; color: #666; }

        /* Admin UI */
        .act-btn { font-family: 'Bangers', cursive; padding: 8px 16px; border: 2px solid black; cursor: pointer; box-shadow: 3px 3px 0px black; margin-right: 10px; }
        .btn-delete { background: var(--ink-black); color: white; }
    </style>
</head>
<body>

<div class="portal">
    <div class="header">
        <h1 class="brand-name">Voice Hub</h1>
        <p class="brand-sub">WHERE EVERY WORD PACKS A PUNCH!</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="openTab('submit', this)">SEND DISPATCH</button>
        <button class="tab" onclick="openTab('board', this)">THE HUB</button>
        <button class="tab" onclick="openTab('admin', this)">ADMIN HQ</button>
    </div>

    <div id="submit" class="section active">
        <div class="card">
            <label class="lbl">SELECT CATEGORY</label>
            <div class="btn-group" id="cat-group">
                <button class="choice-btn" onclick="setCat('conflict', this)">Conflict</button>
                <button class="choice-btn" onclick="setCat('management', this)">Management</button>
                <button class="choice-btn" onclick="setCat('policy', this)">Policy</button>
                <button class="choice-btn" onclick="setCat('wellbeing', this)">Wellbeing</button>
            </div>

            <label class="lbl">URGENCY LEVEL</label>
            <div class="btn-group" id="sev-group">
                <button class="choice-btn" onclick="setSev('low', this)">Low</button>
                <button class="choice-btn" onclick="setSev('medium', this)">Medium</button>
                <button class="choice-btn" onclick="setSev('high', this)">High</button>
            </div>

            <label class="lbl">YOUR MESSAGE</label>
            <textarea id="fb-text" class="msg-area" placeholder="Write your message here..."></textarea>
            <button class="submit-btn" onclick="submitReport()">BROADCAST NOW!</button>
        </div>
    </div>

    <div id="board" class="section">
        <div id="board-grid"></div>
    </div>

    <div id="admin" class="section">
        <div id="admin-gate" class="card" style="text-align:center;">
            <label class="lbl">ADMIN KEY REQUIRED</label>
            <input type="password" id="admin-pass" style="padding:10px; border:3px solid black; width:200px; font-size:18px;"><br><br>
            <button class="choice-btn" onclick="login()">ENTER HQ</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <div id="admin-list"></div>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Integration
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCg5LSNh0EIKjv5eQKPpWT8ZMF49zQX9Dc",
        authDomain: "voice-hub-portal.firebaseapp.com",
        databaseURL: "https://voice-hub-portal-default-rtdb.firebaseio.com",
        projectId: "voice-hub-portal",
        storageBucket: "voice-hub-portal.firebasestorage.app",
        messagingSenderId: "1052590708905",
        appId: "1:1052590708905:web:50237423f82a3c4ceeb1b8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const reportsRef = ref(db, 'reports');

    let allReports = [];
    let selCat = '';
    let selSev = '';

    // Navigation
    window.openTab = function(tabId, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    };

    // Selection Logic (Fixed Medium Button)
    window.setCat = (val, btn) => {
        selCat = val;
        document.querySelectorAll('#cat-group .choice-btn').forEach(b => b.classList.remove('sel-conflict','sel-management','sel-policy','sel-wellbeing'));
        btn.classList.add('sel-' + val);
    };

    window.setSev = (val, btn) => {
        selSev = val;
        document.querySelectorAll('#sev-group .choice-btn').forEach(b => b.classList.remove('sel-low','sel-med','sel-high'));
        // We use 'med' class for visual styling to keep it short, but 'medium' for the data
        btn.classList.add('sel-' + (val === 'medium' ? 'med' : val));
    };

    // Submit Dispatch
    window.submitReport = function() {
        const text = document.getElementById('fb-text').value.trim();
        if(!selCat || !selSev || text.length < 5) return alert("Fill out the full dispatch, hero!");

        push(reportsRef, {
            cat: selCat,
            sev: selSev,
            text: text,
            date: new Date().toLocaleDateString()
        });
        
        alert("KAPOW! Message received.");
        document.getElementById('fb-text').value = '';
        selCat = ''; selSev = '';
        document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('sel-conflict','sel-management','sel-policy','sel-wellbeing','sel-low','sel-med','sel-high'));
    };

    // Live Data Listener
    onValue(reportsRef, (snapshot) => {
        const data = snapshot.val();
        allReports = [];
        for (let id in data) { allReports.unshift({ id, ...data[id] }); }
        renderBoard();
        renderAdmin();
    });

    function renderBoard() {
        const grid = document.getElementById('board-grid');
        grid.innerHTML = allReports.map(r => `
            <div class="card">
                <div>
                    <span class="badge" style="background:var(--comic-blue)">${r.cat}</span>
                    <span class="badge ${r.sev === 'medium' ? 'sel-med' : 'sel-' + r.sev}">${r.sev}</span>
                </div>
                <p class="fb-text">"${r.text}"</p>
                <span class="fb-date">LOGGED: ${r.date}</span>
            </div>
        `).join('');
    }

    function renderAdmin() {
        const list = document.getElementById('admin-list');
        list.innerHTML = allReports.map(r => `
            <div class="card">
                <p><strong>ID: ${r.id}</strong></p>
                <p>${r.text}</p>
                <button class="act-btn btn-delete" onclick="hardDelete('${r.id}')">ERASE FROM HUB</button>
            </div>
        `).join('');
    }

    window.hardDelete = (id) => {
        if(confirm("DANGER! Erase this dispatch forever?")) {
            remove(ref(db, `reports/${id}`));
        }
    };

    window.login = () => {
        if(document.getElementById('admin-pass').value === 'Chat2026') {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("ACCESS DENIED!");
        }
    };
</script>
</body>
</html>
